<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>HiWay RS+ATR Engine</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

    <div class="hero">
        <h1>HiWay RS+ATR Engine</h1>

        <p>
            Volatility-Adjusted Relative Strength Analysis for traders,
            quantitative researchers, portfolio managers, and financial platforms.
        </p>
    </div>

    <div class="container">

        <div class="card">

            <h2>Live Market Analysis Demo</h2>

            <p>
                Enter a ticker symbol and analyze its RS+ATR regime relative to SPY.
            </p>

            <input
                type="text"
                id="symbol"
                placeholder="AAPL"
                value="AAPL">

            <button onclick="analyze()">
                Analyze
            </button>

            <div class="quick-buttons">
                <button onclick="setSymbol('AAPL')">AAPL</button>
                <button onclick="setSymbol('MSFT')">MSFT</button>
                <button onclick="setSymbol('NVDA')">NVDA</button>
                <button onclick="setSymbol('TSLA')">TSLA</button>
            </div>

        </div>

        <div id="results"></div>

        <div class="card">
            <h3>API Resources</h3>

            <p>
                /docs
            </p>

            <p>
                <a href="/health">Health Status</a>
            </p>
        </div>

    </div>

    <script>

        function setSymbol(symbol) {
            document.getElementById("symbol").value = symbol;
        }

        async function analyze() {

            const symbol =
                document.getElementById("symbol").value.trim().toUpperCase();

            if (!symbol) {
                return;
            }

            try {

                const response = await fetch(
                    "/api/v1/calculate",
                    {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json"
                        },
                        body: JSON.stringify({
                            symbol: symbol,
                            benchmark: "SPY",
                            timeframe: "1d",
                            bars: 500
                        })
                    }
                );

                const data = await response.json();

                if (data.error) {

                    document.getElementById("results").innerHTML =
                        `
                        <div class="card">
                            <h3>Error</h3>
                            <p style="color:#ef4444;">
                                ${data.error}
                            </p>
                        </div>
                        `;

                    return;
                }

                const regime = data.current.regime;
                const rsatr = data.current.rs_atr;

                let regimeText = "Range-Bound";
                let regimeColor = "#f59e0b";

                if (regime > 0) {
                    regimeText = "Bullish";
                    regimeColor = "#10b981";
                }

                if (regime < 0) {
                    regimeText = "Bearish";
                    regimeColor = "#ef4444";
                }

                let strengthText = "Neutral";

                if (rsatr > 0.5) {
                    strengthText = "Strong";
                }
                else if (rsatr < -0.5) {
                    strengthText = "Weak";
                }

                document.getElementById("results").innerHTML =
                    `
                    <div class="card">

                        <h2>${data.symbol.toUpperCase()}</h2>

                        <p>
                            <strong>Strength:</strong>
                            ${strengthText}
                        </p>

                        <p>
                            <strong>RS+ATR:</strong>
                            ${rsatr.toFixed(2)}
                        </p>

                        <p>
                            <strong>Regime:</strong>
                            <span style="color:${regimeColor}; font-weight:bold;">
                                ${regimeText}
                            </span>
                        </p>

                        <p>
                            <strong>Close Price:</strong>
                            $${data.current.close.toFixed(2)}
                        </p>

                        <p>
                            <strong>Benchmark:</strong>
                            SPY
                        </p>

                        <p>
                            <strong>Updated:</strong>
                            ${new Date(data.timestamp).toLocaleString()}
                        </p>

                    </div>
                    `;

            }
            catch (error) {

                document.getElementById("results").innerHTML =
                    `
                    <div class="card">
                        <h3>Error</h3>

                        <p style="color:#ef4444;">
                            Unable to connect to the API.
                        </p>
                    </div>
                    `;

                console.error(error);
            }
        }

        document.addEventListener("DOMContentLoaded", () => {
            analyze();
        });

    </script>

</body>

</html>
